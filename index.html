<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="./source/style.css" />
  <link rel="icon" href=" " type="img" />
  <title>Card Game</title>
</head>

<body>
  <header class="titleGame">
    <img src=".source/assets/Gemini_Generated_Image_wc01mdwc01mdwc01.png" alt="logo game">
  </header>

  <main class="container">
    <section class="infoPlayer">
        <div> Qual seu Nome ? <input id="nome" autofocus placeholder="Ex. Maria Silva"  type="text"></input> </div>
        <div> Qual sua idade ? <input placeholder="Ex. 24" type="date"></input></div>
        <div> Qual sua cor ? <input type="color"></input></div>
      <h5>Descubra qual feiticeiro você seria</h5>
      <button onclick="pickup()" type="submit" id="play">Iniciar</button>
    </section>


    <section class="playerStats">
      <h2 id="playerid"> Descubra quem você seria! </h2>
      <div class="resultado">
      <img id="Personagem" onload="async" src="./assets/sukunaCard.png" alt="">
</div>    
    </section>
  </main>


</body>
<script src="./source/cardgame.js"></script>
</html>
